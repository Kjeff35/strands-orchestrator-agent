<svg xmlns="http://www.w3.org/2000/svg" width="860" height="620" viewBox="0 0 860 620" font-family="'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="860" height="620" fill="#f8f9fc" rx="12"/>

  <!-- Title -->
  <text x="430" y="44" text-anchor="middle" font-size="20" font-weight="700" fill="#1e1e2e">Travel Planner — Orchestrator Architecture</text>

  <!-- User Request box -->
  <rect x="320" y="70" width="220" height="56" rx="10" fill="#dbe4ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="430" y="98" text-anchor="middle" font-size="15" font-weight="600" fill="#1d3a8a">User Request</text>
  <text x="430" y="116" text-anchor="middle" font-size="12" fill="#4a6fa5">"Plan my Tokyo trip"</text>

  <!-- Arrow: User → Orchestrator -->
  <line x1="430" y1="126" x2="430" y2="168" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Orchestrator box -->
  <rect x="215" y="168" width="430" height="72" rx="10" fill="#e5dbff" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="430" y="196" text-anchor="middle" font-size="17" font-weight="700" fill="#4c1d95">Orchestrator Agent</text>
  <text x="430" y="216" text-anchor="middle" font-size="12" fill="#6d28d9">Receives request · Decides which specialists to call · Synthesises final response</text>
  <text x="430" y="232" text-anchor="middle" font-size="11" fill="#7c3aed">BedrockModel · Claude Haiku · system prompt</text>

  <!-- Specialist zone background -->
  <rect x="50" y="300" width="760" height="210" rx="12" fill="#d3f9d8" fill-opacity="0.45" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="72" y="320" font-size="13" font-weight="600" fill="#15803d">Specialist Agents (called as tools)</text>

  <!-- Arrows: Orchestrator → Specialists -->
  <!-- to destination_researcher -->
  <line x1="320" y1="240" x2="175" y2="338" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrP)"/>
  <!-- to trip_planner -->
  <line x1="430" y1="240" x2="430" y2="338" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrP)"/>
  <!-- to product_recommender -->
  <line x1="540" y1="240" x2="685" y2="338" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrP)"/>

  <!-- destination_researcher -->
  <rect x="62" y="338" width="222" height="74" rx="10" fill="#fff3e0" stroke="#f59e0b" stroke-width="2"/>
  <text x="173" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">destination_researcher</text>
  <text x="173" y="380" text-anchor="middle" font-size="11" fill="#78350f">visa · climate · safety</text>
  <text x="173" y="394" text-anchor="middle" font-size="11" fill="#78350f">culture · costs</text>

  <!-- trip_planner -->
  <rect x="319" y="338" width="222" height="74" rx="10" fill="#fff3e0" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">trip_planner</text>
  <text x="430" y="380" text-anchor="middle" font-size="11" fill="#78350f">day-by-day itinerary</text>
  <text x="430" y="394" text-anchor="middle" font-size="11" fill="#78350f">with activities &amp; durations</text>

  <!-- product_recommender -->
  <rect x="576" y="338" width="222" height="74" rx="10" fill="#fff3e0" stroke="#f59e0b" stroke-width="2"/>
  <text x="687" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">product_recommender</text>
  <text x="687" y="380" text-anchor="middle" font-size="11" fill="#78350f">gear recommendations</text>
  <text x="687" y="394" text-anchor="middle" font-size="11" fill="#78350f">packing list</text>

  <!-- Return arrows: Specialists → Orchestrator (dashed) -->
  <line x1="175" y1="338" x2="320" y2="240" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrG)"/>
  <line x1="430" y1="338" x2="430" y2="240" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrG)"/>
  <line x1="685" y1="338" x2="540" y2="240" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrG)"/>

  <!-- Arrow: Orchestrator → Response -->
  <line x1="430" y1="528" x2="430" y2="556" stroke="#22c55e" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Final Response box -->
  <rect x="295" y="556" width="270" height="52" rx="10" fill="#c3fae8" stroke="#22c55e" stroke-width="2"/>
  <text x="430" y="580" text-anchor="middle" font-size="15" font-weight="700" fill="#065f46">Travel Plan Response</text>
  <text x="430" y="598" text-anchor="middle" font-size="12" fill="#047857">Destination brief · Itinerary · Packing list</text>

  <!-- Connector from zone bottom to response arrow -->
  <line x1="430" y1="510" x2="430" y2="556" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Tool labels on arrows going down -->
  <rect x="82" y="273" width="58" height="18" rx="4" fill="#ede9fe"/>
  <text x="111" y="285" text-anchor="middle" font-size="10" fill="#6d28d9">@tool call</text>
  <rect x="401" y="256" width="58" height="18" rx="4" fill="#ede9fe"/>
  <text x="430" y="268" text-anchor="middle" font-size="10" fill="#6d28d9">@tool call</text>
  <rect x="688" y="273" width="58" height="18" rx="4" fill="#ede9fe"/>
  <text x="717" y="285" text-anchor="middle" font-size="10" fill="#6d28d9">@tool call</text>

  <!-- http_request badge on destination_researcher -->
  <rect x="100" y="416" width="146" height="18" rx="4" fill="#dbe4ff" stroke="#4a9eed" stroke-width="1"/>
  <text x="173" y="428" text-anchor="middle" font-size="10" fill="#1d3a8a">tool: http_request (web search)</text>

  <!-- Step numbers -->
  <circle cx="310" cy="278" r="11" fill="#8b5cf6"/>
  <text x="310" y="283" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>
  <circle cx="430" cy="263" r="11" fill="#8b5cf6"/>
  <text x="430" y="268" text-anchor="middle" font-size="11" font-weight="700" fill="white">2</text>
  <circle cx="550" cy="278" r="11" fill="#8b5cf6"/>
  <text x="550" y="283" text-anchor="middle" font-size="11" font-weight="700" fill="white">3</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

</svg>