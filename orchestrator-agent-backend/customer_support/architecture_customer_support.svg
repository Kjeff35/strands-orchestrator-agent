<svg xmlns="http://www.w3.org/2000/svg" width="860" height="640" viewBox="0 0 860 640" font-family="'Segoe UI', Arial, sans-serif">

  <rect width="860" height="640" fill="#f8f9fc" rx="12"/>

  <text x="430" y="44" text-anchor="middle" font-size="20" font-weight="700" fill="#1e1e2e">Customer Support — Orchestrator Architecture</text>

  <!-- Customer Message -->
  <rect x="295" y="70" width="270" height="56" rx="10" fill="#dbe4ff" stroke="#4a9eed" stroke-width="2"/>
  <text x="430" y="98" text-anchor="middle" font-size="15" font-weight="600" fill="#1d3a8a">Customer Message</text>
  <text x="430" y="116" text-anchor="middle" font-size="12" fill="#4a6fa5">"I was charged twice this month"</text>

  <!-- Arrow: Customer → Orchestrator -->
  <line x1="430" y1="126" x2="430" y2="168" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Orchestrator -->
  <rect x="215" y="168" width="430" height="72" rx="10" fill="#e5dbff" stroke="#8b5cf6" stroke-width="2.5"/>
  <text x="430" y="196" text-anchor="middle" font-size="17" font-weight="700" fill="#4c1d95">Orchestrator Agent</text>
  <text x="430" y="216" text-anchor="middle" font-size="12" fill="#6d28d9">Calls each specialist in sequence, passing prior output as context</text>
  <text x="430" y="232" text-anchor="middle" font-size="11" fill="#7c3aed">BedrockModel · Claude Haiku · system prompt</text>

  <!-- Specialist zone -->
  <rect x="50" y="300" width="760" height="215" rx="12" fill="#ffd8a8" fill-opacity="0.3" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="72" y="320" font-size="13" font-weight="600" fill="#92400e">Specialist Agents (called as tools by the orchestrator)</text>

  <!-- Arrows: Orchestrator → Specialists (call) -->
  <line x1="310" y1="240" x2="175" y2="338" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrP)"/>
  <line x1="430" y1="240" x2="430" y2="338" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrP)"/>
  <line x1="550" y1="240" x2="685" y2="338" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrP)"/>

  <!-- Call labels -->
  <text x="224" y="284" text-anchor="middle" font-size="10" fill="#6d28d9">call 1</text>
  <text x="452" y="278" text-anchor="middle" font-size="10" fill="#6d28d9">call 2 (+ triage)</text>
  <text x="640" y="284" text-anchor="middle" font-size="10" fill="#6d28d9">call 3 (+ resolution)</text>

  <!-- Step numbers -->
  <circle cx="230" cy="295" r="11" fill="#8b5cf6"/>
  <text x="230" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>
  <circle cx="430" cy="290" r="11" fill="#8b5cf6"/>
  <text x="430" y="295" text-anchor="middle" font-size="11" font-weight="700" fill="white">2</text>
  <circle cx="628" cy="295" r="11" fill="#8b5cf6"/>
  <text x="628" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="white">3</text>

  <!-- triage_agent -->
  <rect x="62" y="338" width="222" height="74" rx="10" fill="#fff3e0" stroke="#f59e0b" stroke-width="2"/>
  <text x="173" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">triage_agent</text>
  <text x="173" y="380" text-anchor="middle" font-size="11" fill="#78350f">classify: billing / technical</text>
  <text x="173" y="394" text-anchor="middle" font-size="11" fill="#78350f">/ enquiry / complaint + urgency</text>

  <!-- faq_agent -->
  <rect x="319" y="338" width="222" height="74" rx="10" fill="#fff3e0" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">faq_agent</text>
  <text x="430" y="380" text-anchor="middle" font-size="11" fill="#78350f">attempt resolution via</text>
  <text x="430" y="394" text-anchor="middle" font-size="11" fill="#78350f">billing / technical / FAQ</text>

  <!-- escalation_agent -->
  <rect x="576" y="338" width="222" height="74" rx="10" fill="#fff3e0" stroke="#f59e0b" stroke-width="2"/>
  <text x="687" y="362" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">escalation_agent</text>
  <text x="687" y="380" text-anchor="middle" font-size="11" fill="#78350f">draft reply or escalation</text>
  <text x="687" y="394" text-anchor="middle" font-size="11" fill="#78350f">note for human agent</text>

  <!-- Return arrows: Specialists → Orchestrator (result) -->
  <line x1="175" y1="338" x2="310" y2="240" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrG)"/>
  <line x1="430" y1="338" x2="430" y2="240" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrG)"/>
  <line x1="685" y1="338" x2="550" y2="240" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrG)"/>

  <!-- Return labels -->
  <text x="228" y="308" text-anchor="middle" font-size="10" fill="#047857">triage summary</text>
  <text x="408" y="308" text-anchor="middle" font-size="10" fill="#047857">resolution attempt</text>
  <text x="638" y="308" text-anchor="middle" font-size="10" fill="#047857">final response</text>

  <!-- Decision diamond -->
  <polygon points="430,520 490,555 430,590 370,555" fill="#fff3bf" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="552" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">Resolved?</text>

  <!-- Arrow: zone → decision -->
  <line x1="430" y1="515" x2="430" y2="520" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Resolved → customer reply -->
  <line x1="370" y1="555" x2="225" y2="555" stroke="#22c55e" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="298" y="548" text-anchor="middle" font-size="11" fill="#065f46">Yes</text>
  <rect x="80" y="532" width="145" height="46" rx="10" fill="#c3fae8" stroke="#22c55e" stroke-width="2"/>
  <text x="153" y="553" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Customer Reply</text>
  <text x="153" y="570" text-anchor="middle" font-size="11" fill="#047857">closing response</text>

  <!-- Not resolved → escalation -->
  <line x1="490" y1="555" x2="635" y2="555" stroke="#ef4444" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="563" y="548" text-anchor="middle" font-size="11" fill="#b91c1c">No</text>
  <rect x="635" y="532" width="145" height="46" rx="10" fill="#ffc9c9" stroke="#ef4444" stroke-width="2"/>
  <text x="708" y="553" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">Escalation Note</text>
  <text x="708" y="570" text-anchor="middle" font-size="11" fill="#b91c1c">human agent handoff</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrP" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b5cf6"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444"/>
    </marker>
  </defs>

</svg>
